<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>久留米焼鳥つかさ｜お持ち帰り予約</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Hiragino Kaku Gothic Pro', 'ヒラギノ角ゴ Pro', Meiryo, sans-serif;
    background: #f5f0e8;
    color: #333;
    min-height: 100vh;
  }
  .header {
    background: #1a1a1a;
    color: #c9a84c;
    text-align: center;
    padding: 24px 16px;
  }
  .header .logo {
    font-size: 13px;
    letter-spacing: 3px;
    margin-bottom: 4px;
    color: #999;
  }
  .header h1 {
    font-size: 22px;
    letter-spacing: 2px;
    margin-bottom: 4px;
  }
  .header p {
    font-size: 12px;
    color: #aaa;
  }
  .container {
    max-width: 480px;
    margin: 0 auto;
    padding: 20px 16px 40px;
  }
  .section {
    background: white;
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  .section-title {
    font-size: 14px;
    font-weight: bold;
    color: #1a1a1a;
    border-left: 3px solid #c9a84c;
    padding-left: 10px;
    margin-bottom: 16px;
  }
  .form-group {
    margin-bottom: 14px;
  }
  label {
    display: block;
    font-size: 13px;
    color: #555;
    margin-bottom: 6px;
  }
  .required {
    color: #c0392b;
    font-size: 11px;
    margin-left: 4px;
  }
  input[type="text"],
  input[type="tel"],
  select {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #ddd;
    border-radius: 6px;
    font-size: 15px;
    color: #333;
    background: #fafafa;
    appearance: none;
    -webkit-appearance: none;
  }
  input:focus, select:focus {
    outline: none;
    border-color: #c9a84c;
    background: white;
  }
  .menu-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid #f0f0f0;
  }
  .menu-item:last-child { border-bottom: none; }
  .menu-info {
    flex: 1;
  }
  .menu-name {
    font-size: 14px;
    font-weight: bold;
    color: #1a1a1a;
  }
  .menu-price {
    font-size: 12px;
    color: #c9a84c;
    margin-top: 2px;
  }
  .qty-control {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .qty-btn {
    width: 32px;
    height: 32px;
    border: 1px solid #ddd;
    background: white;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #333;
    line-height: 1;
  }
  .qty-btn:active { background: #f0f0f0; }
  .qty-display {
    width: 28px;
    text-align: center;
    font-size: 16px;
    font-weight: bold;
  }
  .total-section {
    background: #1a1a1a;
    color: white;
    border-radius: 8px;
    padding: 16px 20px;
    margin-bottom: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .total-label { font-size: 14px; color: #aaa; }
  .total-amount { font-size: 22px; font-weight: bold; color: #c9a84c; }
  .total-count { font-size: 12px; color: #777; margin-top: 2px; }
  .submit-btn {
    width: 100%;
    padding: 16px;
    background: #c9a84c;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: bold;
    letter-spacing: 2px;
    cursor: pointer;
  }
  .submit-btn:active { background: #b8943f; }
  .note {
    font-size: 11px;
    color: #999;
    text-align: center;
    margin-top: 12px;
    line-height: 1.6;
  }
  .time-select-wrap {
    position: relative;
  }
  .time-select-wrap::after {
    content: '▼';
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 10px;
    color: #999;
    pointer-events: none;
  }
  .tag {
    display: inline-block;
    background: #f5f0e8;
    color: #c9a84c;
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 3px;
    margin-left: 6px;
    font-weight: bold;
  }

  /* 確認画面 */
  #confirm-screen {
    display: none;
  }
  .confirm-row {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid #f0f0f0;
    font-size: 14px;
  }
  .confirm-row:last-child { border-bottom: none; }
  .confirm-label { color: #888; }
  .back-btn {
    width: 100%;
    padding: 14px;
    background: white;
    color: #333;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    margin-bottom: 10px;
  }
  .complete-screen {
    display: none;
    text-align: center;
    padding: 40px 20px;
  }
  .complete-icon {
    font-size: 48px;
    margin-bottom: 16px;
  }
  .complete-title {
    font-size: 20px;
    font-weight: bold;
    margin-bottom: 8px;
    color: #1a1a1a;
  }
  .complete-msg {
    font-size: 13px;
    color: #666;
    line-height: 1.8;
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">KURUME YAKITORI</div>
  <h1>久留米焼鳥 つかさ</h1>
  <p>ゆめマート限定｜お持ち帰り予約フォーム</p>
</div>

<!-- 注文フォーム -->
<div id="order-screen">
<div class="container">

  <!-- お客様情報 -->
  <div class="section">
    <div class="section-title">お客様情報</div>
    <div class="form-group">
      <label>お名前<span class="required">必須</span></label>
      <input type="text" id="name" placeholder="例：山田 太郎">
    </div>
    <div class="form-group">
      <label>電話番号<span class="required">必須</span></label>
      <input type="tel" id="phone" placeholder="例：090-0000-0000">
    </div>
  </div>

  <!-- 受け取り時間 -->
  <div class="section">
    <div class="section-title">受け取り時間<span class="required">必須</span></div>
    <div class="time-select-wrap">
      <select id="pickup-time">
        <option value="">時間を選んでください</option>
        <option value="16:00">16:00</option>
        <option value="16:30">16:30</option>
        <option value="17:00">17:00</option>
        <option value="17:30">17:30</option>
        <option value="18:00">18:00</option>
        <option value="18:30">18:30</option>
        <option value="19:00">19:00</option>
        <option value="19:30">19:30</option>
        <option value="19:45">19:45（ラスト）</option>
      </select>
    </div>
  </div>

  <!-- メニュー選択 -->
  <div class="section">
    <div class="section-title">メニューを選んでください</div>

    <div id="menu-list">
      <!-- JSで生成 -->
    </div>
  </div>

  <!-- 合計 -->
  <div class="total-section">
    <div>
      <div class="total-label">合計金額</div>
      <div class="total-count" id="total-count">0本選択中</div>
    </div>
    <div class="total-amount" id="total-amount">¥0</div>
  </div>

  <button class="submit-btn" onclick="goConfirm()">内容を確認する →</button>
  <p class="note">※ 受け取り時間の20分前までにご予約ください<br>※ お支払いは受け取り時に現金でお願いします</p>

</div>
</div>

<!-- 確認画面 -->
<div id="confirm-screen">
<div class="container">
  <div class="section">
    <div class="section-title">ご注文内容の確認</div>
    <div id="confirm-content"></div>
  </div>
  <button class="back-btn" onclick="goBack()">← 内容を修正する</button>
  <button class="submit-btn" onclick="submitOrder()">この内容で予約する</button>
</div>
</div>

<!-- 完了画面 -->
<div class="complete-screen" id="complete-screen">
<div class="container">
  <div class="complete-icon">🎉</div>
  <div class="complete-title">予約を受け付けました</div>
  <div class="complete-msg">
    ありがとうございます！<br>
    ご指定の時間にゆめマートの<br>
    つかさブースにお越しください。<br><br>
    <strong id="complete-summary"></strong>
  </div>
</div>
</div>

<script>
const MENU = [
  { id: 1, name: 'ヤゲン軟骨', price: 160 },
  { id: 2, name: '牛さがりステーキ串', price: 300, tag: '人気' },
  { id: 3, name: '豚バラ', price: 160 },
  { id: 4, name: '鶏もも', price: 160, tag: '定番' },
  { id: 5, name: 'かわ', price: 100 },
  { id: 6, name: 'つくね', price: 100, tag: '定番' },
  { id: 7, name: 'ダルム', price: 100 },
  { id: 8, name: 'ウインナー', price: 100 },
  { id: 9, name: 'ネオ柚子胡椒豚バラ', price: 200 },
  { id: 10, name: '糸島特製みそ豚バラ', price: 200 },
  { id: 11, name: 'みそホルモン', price: 200 },
  { id: 12, name: '砂ズリ', price: 200 },
  { id: 13, name: '塩焼きイカ串', price: 250 },
];

const qty = {};
MENU.forEach(m => qty[m.id] = 0);

function renderMenu() {
  const el = document.getElementById('menu-list');
  el.innerHTML = MENU.map(m => `
    <div class="menu-item">
      <div class="menu-info">
        <div class="menu-name">${m.name}${m.tag ? `<span class="tag">${m.tag}</span>` : ''}</div>
        <div class="menu-price">¥${m.price.toLocaleString()} / 本</div>
      </div>
      <div class="qty-control">
        <button class="qty-btn" onclick="changeQty(${m.id}, -1)">−</button>
        <div class="qty-display" id="qty-${m.id}">0</div>
        <button class="qty-btn" onclick="changeQty(${m.id}, 1)">＋</button>
      </div>
    </div>
  `).join('');
}

function changeQty(id, delta) {
  qty[id] = Math.max(0, qty[id] + delta);
  document.getElementById(`qty-${id}`).textContent = qty[id];
  updateTotal();
}

function updateTotal() {
  let total = 0, count = 0;
  MENU.forEach(m => {
    total += m.price * qty[m.id];
    count += qty[m.id];
  });
  document.getElementById('total-amount').textContent = `¥${total.toLocaleString()}`;
  document.getElementById('total-count').textContent = `${count}本選択中`;
}

function goConfirm() {
  const name = document.getElementById('name').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const time = document.getElementById('pickup-time').value;

  if (!name) { alert('お名前を入力してください'); return; }
  if (!phone) { alert('電話番号を入力してください'); return; }
  if (!time) { alert('受け取り時間を選んでください'); return; }

  const ordered = MENU.filter(m => qty[m.id] > 0);
  if (ordered.length === 0) { alert('商品を1本以上選んでください'); return; }

  let total = 0;
  const itemsHtml = ordered.map(m => {
    const subtotal = m.price * qty[m.id];
    total += subtotal;
    return `<div class="confirm-row"><span>${m.name} × ${qty[m.id]}本</span><span>¥${subtotal.toLocaleString()}</span></div>`;
  }).join('');

  document.getElementById('confirm-content').innerHTML = `
    <div class="confirm-row"><span class="confirm-label">お名前</span><span>${name}</span></div>
    <div class="confirm-row"><span class="confirm-label">電話番号</span><span>${phone}</span></div>
    <div class="confirm-row"><span class="confirm-label">受け取り時間</span><span>${time}</span></div>
    <br>
    ${itemsHtml}
    <div class="confirm-row" style="font-weight:bold;font-size:15px;margin-top:8px">
      <span>合計</span><span style="color:#c9a84c">¥${total.toLocaleString()}</span>
    </div>
  `;

  document.getElementById('order-screen').style.display = 'none';
  document.getElementById('confirm-screen').style.display = 'block';
  window.scrollTo(0, 0);
}

function goBack() {
  document.getElementById('confirm-screen').style.display = 'none';
  document.getElementById('order-screen').style.display = 'block';
  window.scrollTo(0, 0);
}

function submitOrder() {
  const name = document.getElementById('name').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const time = document.getElementById('pickup-time').value;

  const ordered = MENU.filter(m => qty[m.id] > 0);
  const items = ordered.map(m => `${m.name}×${qty[m.id]}本`).join('、');
  const total = ordered.reduce((sum, m) => sum + m.price * qty[m.id], 0);

  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw3Jp0TzEGjEqUtw_2EI-AQiMpZ854ZYHxQrAQHfBhP4hZUENUzRp4ROJYXe9fDZ4C8SQ/exec';

  fetch(SCRIPT_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, phone, pickupTime: time, items, total: `¥${total.toLocaleString()}` })
  });

  document.getElementById('complete-summary').textContent = `${name} 様｜受け取り ${time}`;
  document.getElementById('confirm-screen').style.display = 'none';
  document.getElementById('complete-screen').style.display = 'block';
  window.scrollTo(0, 0);
}

renderMenu();
</script>
</body>
</html>
